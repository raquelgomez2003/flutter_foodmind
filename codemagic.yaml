workflows:
  ios-workflow:
    name: iOS Flutter Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Build iOS without signing
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/archive/Runner.xcarchive/**
